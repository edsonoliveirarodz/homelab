---
- name: Create ArgoCD namespace
  ansible.builtin.command:
    cmd: kubectl create namespace argocd
  register: create_argocd_ns
  failed_when: create_argocd_ns.rc != 0 and 'already exists' not in create_argocd_ns.stderr
  changed_when: create_argocd_ns.rc == 0

- name: Install ArgoCD
  ansible.builtin.command:
    cmd: kubectl apply --server-side=true -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/v{{ argocd_version }}/manifests/install.yaml
  changed_when: true

- name: Wait for ArgoCD deployments to be created
  ansible.builtin.command:
    cmd: kubectl -n argocd get deployment
  register: argocd_deployments
  until: argocd_deployments.rc == 0 and argocd_deployments.stdout != ""
  retries: 30
  delay: 10
  changed_when: false

- name: Wait for ArgoCD to be ready
  ansible.builtin.command:
    cmd: kubectl -n argocd wait --for=condition=available deployment --all --timeout=300s
  changed_when: false

- name: Set ArgoCD server insecure mode
  ansible.builtin.command:
    cmd: kubectl patch configmap argocd-cmd-params-cm -n argocd --type merge -p '{"data":{"server.insecure":"true"}}'
  changed_when: true

- name: Restart ArgoCD server to apply insecure mode
  ansible.builtin.command:
    cmd: kubectl rollout restart deployment argocd-server -n argocd
  changed_when: true

- name: Wait for ArgoCD server to be ready after restart
  ansible.builtin.command:
    cmd: kubectl -n argocd rollout status deployment argocd-server --timeout=120s
  changed_when: false

- name: Bootstrap App of Apps
  ansible.builtin.command:
    cmd: kubectl apply -f -
    stdin: |
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: app-of-apps
        namespace: argocd
      spec:
        project: default
        source:
          repoURL: {{ gitops_repo_url }}
          targetRevision: HEAD
          path: gitops/apps
        destination:
          server: https://kubernetes.default.svc
          namespace: argocd
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
  changed_when: true
...
