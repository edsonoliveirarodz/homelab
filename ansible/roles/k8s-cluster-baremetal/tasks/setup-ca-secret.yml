---
- name: Create cert-manager namespace
  ansible.builtin.command:
    cmd: kubectl create namespace cert-manager
  register: create_cm_ns
  failed_when: create_cm_ns.rc != 0 and 'already exists' not in create_cm_ns.stderr
  changed_when: create_cm_ns.rc == 0

- name: Copy CA certificate to control plane
  ansible.builtin.copy:
    src: pki/homelab-ca.crt
    dest: /tmp/homelab-ca.crt
    mode: '0644'

- name: Copy CA key to control plane
  ansible.builtin.copy:
    src: pki/homelab-ca.key
    dest: /tmp/homelab-ca.key
    mode: '0600'

- name: Create homelab CA secret
  ansible.builtin.command:
    cmd: >
      kubectl create secret tls homelab-ca-key-pair
      --namespace cert-manager
      --cert=/tmp/homelab-ca.crt
      --key=/tmp/homelab-ca.key
  register: create_ca_secret
  failed_when: create_ca_secret.rc != 0 and 'already exists' not in create_ca_secret.stderr
  changed_when: create_ca_secret.rc == 0

- name: Remove CA files from control plane
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/homelab-ca.crt
    - /tmp/homelab-ca.key
...
