apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ceph-dashboard
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/edsonoliveirarodz/homelab.git
    targetRevision: HEAD
    path: gitops/manifests/ceph-dashboard
  destination:
    server: https://kubernetes.default.svc
    namespace: rook-ceph
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
