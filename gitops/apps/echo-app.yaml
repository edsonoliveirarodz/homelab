apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: echo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/edsonoliveirarodz/homelab.git
    targetRevision: HEAD
    path: gitops/manifests/echo-app
  destination:
    server: https://kubernetes.default.svc
    namespace: echo-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
