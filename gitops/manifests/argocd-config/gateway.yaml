apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: argocd-gateway
  namespace: argocd
spec:
  gatewayClassName: cilium
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      hostname: argocd.homelab.local
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-homelab-tls
      allowedRoutes:
        namespaces:
          from: Same
