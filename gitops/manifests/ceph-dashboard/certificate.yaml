apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ceph-wildcard-cert
  namespace: rook-ceph
spec:
  secretName: wildcard-homelab-tls
  dnsNames:
    - "*.homelab.local"
    - homelab.local
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: homelab-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
