apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-gateway
  namespace: gateway-system
spec:
  gatewayClassName: cilium
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      hostname: "*.homelab.local"
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-homelab-tls
      allowedRoutes:
        namespaces:
          from: All
