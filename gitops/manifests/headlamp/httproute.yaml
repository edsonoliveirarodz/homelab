apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp
  namespace: headlamp
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
  hostnames:
    - dashboard.homelab.local
  rules:
    - backendRefs:
        - name: headlamp
          port: 80
