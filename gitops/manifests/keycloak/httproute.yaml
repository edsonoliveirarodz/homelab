apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
  hostnames:
    - keycloak.homelab.local
  rules:
    - backendRefs:
        - name: keycloak-keycloakx-http
          port: 80
